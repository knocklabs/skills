<!--
  Comment card partial
  Variables:
    - author_name: Name of the commenter
    - author_avatar_url: (optional) URL to the commenter's avatar image
    - body: The comment text
    - timestamp: (optional) When the comment was posted (e.g. "2 hours ago", "Jan 15, 2026")
    - action_url: (optional) URL to link to the full comment or thread
    - action_label: (optional) Label for the action link (defaults to "View comment")
-->
<table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin: 16px 0;">
  <tr>
    <td style="background-color: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 8px; padding: 20px 24px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation">
        <!-- Author row -->
        <tr>
          <td style="padding-bottom: 12px;">
            <table cellpadding="0" cellspacing="0" border="0" role="presentation">
              <tr>
                {% if author_avatar_url %}
                <td style="vertical-align: middle; padding-right: 12px;">
                  <img src="{{ author_avatar_url }}" alt="{{ author_name }}" width="32" height="32" style="border-radius: 50%; display: block;" />
                </td>
                {% else %}
                <td style="vertical-align: middle; padding-right: 12px;">
                  <div style="width: 32px; height: 32px; border-radius: 50%; background-color: #6366F1; text-align: center; line-height: 32px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; color: #FFFFFF;">{{ author_name | slice: 0 | upcase }}</div>
                </td>
                {% endif %}
                <td style="vertical-align: middle;">
                  <span style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; color: #111827; display: block; line-height: 20px;">{{ author_name }}</span>
                  {% if timestamp %}
                  <span style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; color: #9CA3AF; display: block; line-height: 16px;">{{ timestamp }}</span>
                  {% endif %}
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Comment body -->
        <tr>
          <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; line-height: 22px; color: #374151; padding-bottom: {% if action_url %}16px{% else %}0{% endif %};">
            {{ body }}
          </td>
        </tr>
        <!-- Action link -->
        {% if action_url %}
        <tr>
          <td style="border-top: 1px solid #F3F4F6; padding-top: 12px;">
            <a href="{{ action_url }}" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 500; color: #6366F1; text-decoration: none;">{{ action_label | default: "View comment" }} &rarr;</a>
          </td>
        </tr>
        {% endif %}
      </table>
    </td>
  </tr>
</table>
