<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); padding: 32px; text-align: center;">
  {% if dismissible %}
  <div style="text-align: right; margin: -16px -16px 8px 0;">
    <span style="cursor: pointer; color: #9ca3af; font-size: 20px;">&times;</span>
  </div>
  {% endif %}

  <h2 style="margin: 0 0 8px; font-size: 20px; font-weight: 600; color: #111827;">{{ title }}</h2>

  {% if body != blank %}
  <p style="margin: 0 0 24px; font-size: 14px; color: #6b7280;">{{ body }}</p>
  {% else %}
  <div style="margin-bottom: 24px;"></div>
  {% endif %}

  <div style="display: flex; justify-content: center; gap: 6px; margin-bottom: 8px;">
    {% for i in (0..10) %}
    <div style="width: 36px; height: 36px; border-radius: 8px; border: 1px solid #d1d5db; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #374151; cursor: pointer;">{{ i }}</div>
    {% endfor %}
  </div>

  <div style="display: flex; justify-content: space-between; margin-bottom: 24px; padding: 0 4px;">
    <span style="font-size: 12px; color: #9ca3af;">{{ low_score_label }}</span>
    <span style="font-size: 12px; color: #9ca3af;">{{ high_score_label }}</span>
  </div>

  {% if variant == "with-follow-up" %}
  <div style="margin-bottom: 16px;">
    <p style="font-size: 14px; color: #374151; margin: 0 0 8px; text-align: left;">{{ follow_up_prompt }}</p>
    <textarea style="width: 100%; min-height: 80px; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px; font-size: 14px; resize: vertical; box-sizing: border-box;" placeholder="Tell us more..."></textarea>
  </div>
  <button style="background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer;">{{ submit_button.text }}</button>
  {% endif %}
</div>
